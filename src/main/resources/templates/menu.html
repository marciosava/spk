<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <title>Menu Principal | SPk Sistema</title>
</head>

<!-- Breadcrumb -->
<div layout:fragment="breadcrumb">
    <li class="breadcrumb-item active">Menu</li>
</div>

<!-- Conteúdo Principal -->
<div layout:fragment="corpo">
    <div class="container-fluid">
        <div class="row justify-content-center">

            <!-- PARÂMETROS DO SISTEMA (Admin) -->
            <div class="col-lg-4 col-md-6 mb-4"
                 th:if="${#authorization.expression('hasRole(''ROLE_ADMIN'')')}">
                <div class="card card-primary card-outline">
                    <div class="card-header">
                        <h3 class="card-title text-center">
                            <i class="fas fa-sliders-h mr-2"></i>
                            Parâmetros do Sistema
                        </h3>
                    </div>
                    <div class="card-body text-center">
                        <p class="card-text">Configurações globais do sistema</p>
                        <a th:href="@{/parametros}" class="btn btn-primary">
                            <i class="fas fa-cog mr-1"></i> Acessar
                        </a>
                    </div>
                </div>
            </div>

            <!-- CADASTROS -->
            <div class="col-lg-4 col-md-6 mb-4">
                <div class="card card-success card-outline">
                    <div class="card-header">
                        <h3 class="card-title text-center">
                            <i class="fas fa-database mr-2"></i>
                            Tabela de Cadastros
                        </h3>
                    </div>
                    <div class="card-body text-center">
                        <div class="btn-group" role="group">
                            <a th:href="@{/clientes}" class="btn btn-success">
                                <i class="fas fa-users mr-1"></i> Clientes
                            </a>
                            <a th:href="@{/produtos}" class="btn btn-success">
                                <i class="fas fa-boxes mr-1"></i> Produtos
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RELATÓRIOS -->
            <div class="col-lg-4 col-md-6 mb-4">
                <div class="card card-info card-outline">
                    <div class="card-header">
                        <h3 class="card-title text-center">
                            <i class="fas fa-chart-bar mr-2"></i>
                            Relatórios
                        </h3>
                    </div>
                    <div class="card-body text-center">
                        <a th:href="@{/relatorios}" class="btn btn-info">
                            <i class="fas fa-file-alt mr-1"></i> Gerar Relatórios
                        </a>
                    </div>
                </div>
            </div>

            <!-- USUÁRIOS (Admin) -->
            <div class="col-lg-4 col-md-6 mb-4"
                 th:if="${#authorization.expression('hasRole(''ROLE_ADMIN'')')}">
                <div class="card card-danger card-outline">
                    <div class="card-header">
                        <h3 class="card-title text-center">
                            <i class="fas fa-user-cog mr-2"></i>
                            Administração
                        </h3>
                    </div>
                    <div class="card-body text-center">
                        <a th:href="@{/usuarios}" class="btn btn-danger">
                            <i class="fas fa-users-cog mr-1"></i> Gerenciar Usuários
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Scripts Específicos -->
<div layout:fragment="scripts-adicionais">
    <script>
        // Alternador de tema
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        }

        // Aplicar tema salvo
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
        }
    </script>
</div>

</html>
