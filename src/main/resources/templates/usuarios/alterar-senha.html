<!-- templates/conta/alterar-senha.html -->
<!DOCTYPE html>
<html lang="pt-br"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
  <title>Alterar Senha</title>
</head>

<!-- Breadcrumb -->
<div layout:fragment="breadcrumb">
  <li class="breadcrumb-item"><a th:href="@{/}">Home</a></li>
  <li class="breadcrumb-item"><a th:href="@{/conta}">Conta</a></li>
  <li class="breadcrumb-item active">Alterar Senha</li>
</div>

<!-- Conteúdo -->
<section layout:fragment="corpo" class="content">
  <div class="container-fluid">

    <th:block th:with="
      titulo='Alterar Senha',
      icone='fas fa-key',
      action=@{/usuarios/alterar-senha},
      method='post',
      voltar=@{/usuarios},
      enctype='application/x-www-form-urlencoded'
    ">

      <!-- Card padrão recebendo o corpo como parâmetro (~{::formBody}) -->
      <div th:replace="~{fragments/form-card :: form-card(
          ${titulo}, ${icone}, ${action}, ${method}, ${voltar}, ${enctype},
          ~{::formBody}
      )}">

        <!-- Corpo passado por parâmetro -->
        <th:block th:fragment="formBody" th:object="${alterarSenhaDto}">

          <!-- Alerta (opcional) -->
          <div th:if="${#fields.hasErrors()}" class="alert alert-danger">
            Existem erros de validação. Revise os campos destacados.
          </div>

          <!-- Senha atual -->
          <div class="form-group">
            <label for="senhaAtual">Senha atual</label>
            <div class="input-group">
              <input id="senhaAtual" type="password" class="form-control"
                     th:field="*{senhaAtual}" autocomplete="current-password"
                     placeholder="Digite sua senha atual">
              <div class="input-group-append">
                <button class="btn btn-outline-secondary" type="button"
                        onclick="togglePwd('senhaAtual', this)" title="Mostrar/ocultar">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>
            <small class="text-danger" th:if="${#fields.hasErrors('senhaAtual')}"
                   th:errors="*{senhaAtual}">erro</small>
          </div>

          <!-- Nova senha -->
          <div class="form-group">
            <label for="novaSenha">Nova senha</label>
            <div class="input-group">
              <input id="novaSenha" type="password" class="form-control"
                     th:field="*{novaSenha}" autocomplete="new-password"
                     placeholder="Defina a nova senha">
              <div class="input-group-append">
                <button class="btn btn-outline-secondary" type="button"
                        onclick="togglePwd('novaSenha', this)" title="Mostrar/ocultar">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>
            <small class="form-text text-muted">
              Use ao menos 8 caracteres, misturando letras, números e símbolos.
            </small>
            <small class="text-danger" th:if="${#fields.hasErrors('novaSenha')}"
                   th:errors="*{novaSenha}">erro</small>
          </div>

          <!-- Confirmar nova senha -->
          <div class="form-group">
            <label for="confirmacaoSenha">Confirmar nova senha</label>
            <div class="input-group">
              <input id="confirmacaoSenha" type="password" class="form-control"
                     th:field="*{confirmacaoSenha}" autocomplete="new-password"
                     placeholder="Repita a nova senha">
              <div class="input-group-append">
                <button class="btn btn-outline-secondary" type="button"
                        onclick="togglePwd('confirmacaoSenha', this)" title="Mostrar/ocultar">
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>
            <small class="text-danger" th:if="${#fields.hasErrors('confirmacaoSenha')}"
                   th:errors="*{confirmacaoSenha}">erro</small>
          </div>

        </th:block>
        <!-- /formBody -->

      </div>
      <!-- /form-card -->

    </th:block>
  </div>

  <!-- Script (mova para seu JS global se preferir) -->
  <script>
    function togglePwd(id, btn) {
      const input = document.getElementById(id);
      if (!input) return;
      const icon = btn.querySelector('i');
      input.type = input.type === 'password' ? 'text' : 'password';
      icon.classList.toggle('fa-eye');
      icon.classList.toggle('fa-eye-slash');
    }
  </script>
</section>

</html>
