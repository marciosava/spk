<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <title layout:title-pattern="$LAYOUT_TITLE - $CONTENT_TITLE">Cadastro de Usuário</title>
</head>

<!-- Fragmentos de título e breadcrumbs -->
<h1 layout:fragment="titulo-pagina">Usuários</h1>
<li layout:fragment="breadcrumb">Parâmetros</li>
<li class="breadcrumb-item active" layout:fragment="breadcrumb-ativo">Cadastro de Usuário</li>

<section layout:fragment="corpo">
    <div class="container">

        <h2 class="mb-4">Cadastro de Usuário</h2>

        <form th:action="@{/usuarios/salvar}" th:object="${usuario}" method="post">

            <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
                <p th:each="err : ${#fields.globalErrors()}" th:text="${err}">Erro geral</p>
            </div>

            <input type="hidden" th:field="*{id}" />

            <div class="mb-3">
                <label for="nome" class="form-label">Nome</label>
                <input th:field="*{nome}" id="nome" class="form-control" required />
                <div class="text-danger" th:errors="*{nome}"></div>
            </div>

            <div class="mb-3">
                <label for="username" class="form-label">Login</label>
                <input th:field="*{username}" id="username" class="form-control" required />
                <div class="text-danger" th:errors="*{username}"></div>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input th:field="*{email}" id="email" type="email" class="form-control" required />
                <div class="text-danger" th:errors="*{email}"></div>
            </div>

            <div class="mb-3">
                <label for="dataExpiracao" class="form-label">Data de Expiração</label>
                <input type="date" class="form-control" id="dataExpiracao" name="dataExpiracao"
                       th:field="*{dataExpiracao}">
            </div>

            <div class="row">
                <div class="col-md-6">
                    <label class="form-label">Data de Ativação</label>
                    <input type="text" class="form-control"
                           th:value="${usuario.dataAtivacao != null ? #temporals.format(usuario.dataAtivacao, 'dd/MM/yyyy') : '-'}"
                           readonly>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Data de Desativação</label>
                    <input type="text" class="form-control"
                           th:value="${usuario.dataDesativacao != null ? #temporals.format(usuario.dataDesativacao, 'dd/MM/yyyy') : '-'}"
                           readonly>
                </div>
            </div>

            <div class="mb-3">
                <label for="roles" class="form-label">Perfis</label>
                <select id="roles" th:field="*{roles}" multiple class="form-select">
                    <option th:each="role : ${todosRoles}"
                            th:value="${role.id}"
                            th:text="${role.nome}"></option>
                </select>
                <div class="form-text">Segure Ctrl + Click do Mouse para selecionar múltiplos papéis</div>
                <div class="text-danger" th:errors="*{roles}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Status</label>
                <select th:field="*{ativo}" class="form-select">
                    <option th:value="true">Ativo</option>
                    <option th:value="false">Inativo</option>
                </select>
                <div class="text-danger" th:errors="*{ativo}"></div>
            </div>

            <div class="d-flex justify-content-between">
                <a class="btn btn-secondary" th:href="@{/usuarios}">Cancelar</a>
                <button type="submit" class="btn btn-primary">Salvar</button>
            </div>
        </form>

    </div>

    <div th:if="${mensagem != null}" th:attr="data-msg-sucesso=${mensagem}" style="display:none;"></div>
</section>
</html>
