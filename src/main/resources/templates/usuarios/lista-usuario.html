<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout-iframe}">

<head>
    <title>Lista de Usuários | SPK Sistemas</title>
</head>

<body>
<div layout:fragment="corpo">

    <section class="content">
        <div class="container-fluid px-0">

            <div class="spk-page-title mb-3">
                <h3>
                    <i class="fas fa-users mr-2 text-primary"></i>Usuários Cadastrados
                </h3>
                <p>Consulta, manutenção e gerenciamento dos usuários do sistema.</p>
            </div>

            <div class="card card-outline card-primary spk-shadow-sm">

                <div class="card-header">
                    <div class="d-flex justify-content-between align-items-center flex-wrap">
                        <h3 class="card-title mb-0">
                            <i class="fas fa-list mr-2"></i>Listagem de Usuários
                        </h3>

                        <a class="btn btn-primary btn-sm"
                           th:href="@{/usuarios/cadastrar}">
                            <i class="fas fa-user-plus mr-1"></i>Novo Usuário
                        </a>
                    </div>
                </div>

                <div class="card-body">

                    <!-- FILTRO PADRÃO GLOBAL -->
                    <div th:replace="~{fragments/filtro-grid :: filtro('Filtros', ~{fragments/usuarios/filtro-usuario :: campos})}"></div>

                    <!-- CONFIGURAÇÕES DA GRID -->
                    <div id="usuariosConfig"
                         th:data-url-listar="@{/usuarios/datatables}"
                         th:data-url-editar-base="@{/usuarios/editar/0}"
                         th:data-url-excluir-base="@{/usuarios/excluir/0}">
                    </div>

                    <!-- GRID PADRÃO GLOBAL -->
                    <div th:replace="~{fragments/grid-card :: grid(null, ~{fragments/usuarios/grid-usuario :: tabela})}"></div>

                </div>
            </div>
        </div>
    </section>

    <script th:src="@{/js/spk-filtros.js}"></script>
    <script th:src="@{/js/spk-grid.js}"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {

            const config = document.getElementById('usuariosConfig');
            if (!config) {
                return;
            }

            const urlListar = config.dataset.urlListar;
            const urlEditarBase = config.dataset.urlEditarBase;
            const urlExcluirBase = config.dataset.urlExcluirBase;

            function renderStatus(ativo) {
                return ativo
                    ? '<span class="badge badge-success">Ativo</span>'
                    : '<span class="badge badge-secondary">Inativo</span>';
            }

            function renderPerfis(roles) {
                if (!roles || String(roles).trim() === '') {
                    return '<span class="text-muted">Não informado</span>';
                }

                return String(roles)
                    .split(',')
                    .map(function (role) {
                        const label = role.trim().replace('ROLE_', '').replace(/_/g, ' ');
                        return '<span class="badge badge-info mr-1 mb-1">' + SpkGrid.escapeHtml(label) + '</span>';
                    })
                    .join('');
            }

            function renderAcoes(u) {
                const editar = urlEditarBase.replace('/0', '/' + u.id);
                const excluir = urlExcluirBase.replace('/0', '/' + u.id);
                const nomeUsuario = SpkGrid.escapeHtml(u.nome || u.username || ('ID ' + u.id));

                return `
                    <div class="spk-acoes">
                        <a href="${editar}"
                           class="spk-btn-acao spk-btn-acao--edit"
                           title="Editar usuário">
                            <i class="fas fa-pen"></i>
                        </a>

                        <a href="${excluir}"
                           class="spk-btn-acao spk-btn-acao--delete"
                           title="Excluir usuário"
                           data-spk-confirm="generic"
                           data-title="Confirmar exclusão?"
                           data-message="Deseja realmente excluir o usuário ${nomeUsuario}? Esta ação não poderá ser desfeita.">
                            <i class="fas fa-trash-alt"></i>
                        </a>
                    </div>
                `;
            }

            const tabelaUsuarios = SpkGrid.create({
                tableSelector: '#tabelaUsuarios',
                ajaxUrl: urlListar,
                filterContainerSelector: '[data-spk-filter]',
                autoLoad: false,
                initialMessage: 'Selecione os filtros para Pesquisar.',
                pageLength: 10,
                order: [ [1, 'asc'] ],
                filters: [
                    { param: 'nome', selector: '#filtroNome' },
                    { param: 'ativo', selector: '#filtroStatus' }
                ],
                liveFilters: ['#filtroNome'],
                enterFilters: ['#filtroNome'],
                liveSearchDelay: 400,
                columns: [
                    {
                        data: 'id',
                        className: 'text-center align-middle'
                    },
                    {
                        data: 'nome',
                        className: 'align-middle',
                        render: function (data) {
                            return SpkGrid.escapeHtml(data || '');
                        }
                    },
                    {
                        data: 'username',
                        className: 'align-middle',
                        render: function (data) {
                            return SpkGrid.escapeHtml(data || '');
                        }
                    },
                    {
                        data: 'email',
                        className: 'align-middle',
                        render: function (data) {
                            return SpkGrid.escapeHtml(data || '');
                        }
                    },
                    {
                        data: 'ativo',
                        className: 'text-center align-middle',
                        render: function (data) {
                            return renderStatus(data);
                        }
                    },
                    {
                        data: 'roles',
                        className: 'text-center align-middle',
                        render: function (data) {
                            return renderPerfis(data);
                        }
                    },
                    {
                        data: null,
                        orderable: false,
                        searchable: false,
                        className: 'spk-col-acoes text-right align-middle',
                        render: function (data, type, row) {
                            return renderAcoes(row);
                        }
                    }
                ],
                onAjaxError: function () {
                    console.error('Erro ao carregar dados da grid de usuários.');
                }
            });

            window.tabelaUsuarios = tabelaUsuarios;
            
        });
    </script>

</div>
</body>
</html>
