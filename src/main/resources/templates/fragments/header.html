<!-- fragments/header.html -->
<div th:fragment="cabecalho">

    <!-- Navbar Principal (AdminLTE) -->
    <nav class="main-header navbar navbar-expand navbar-white navbar-light">
        <!-- Left navbar links -->
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link" data-widget="pushmenu" href="#" role="button">
                    <i class="fas fa-bars"></i>
                </a>
            </li>
            <!-- Logo e Nome do Sistema -->
            <li class="nav-item d-none d-sm-inline-block">
                <a href="@{/}" class="nav-link">
                    <img th:src="@{/images/favicon.png}" width="30" height="30" class="d-inline-block align-top" alt="Logo SPk">
                    <span class="ml-2 font-weight-bold">SPk Sistema</span>
                </a>
            </li>
        </ul>

        <!-- Right navbar links -->
        <ul class="navbar-nav ml-auto">
            <!-- User Dropdown Menu -->
            <li class="nav-item dropdown">
                <a class="nav-link" data-toggle="dropdown" href="#">
                    <div class="d-flex align-items-center">
                        <!-- Avatar do Usuário -->
                        <img th:src="@{/images/spk-logo.ico}" class="img-circle elevation-2" alt="User Avatar" width="32" height="32">
                        <div class="ml-2 d-none d-md-inline">
                            <span class="d-block" th:text="${#authentication.name}">Admin</span>
                            <small class="text-muted">
                                <span th:switch="${#authentication.authorities[0].authority}">
                                    <span th:case="'ROLE_ADMIN'">Administrador</span>
                                    <span th:case="'ROLE_USER'">Usuário</span>
                                    <span th:case="*">Visitante</span>
                                </span>
                            </small>
                        </div>
                    </div>
                </a>
                <div class="dropdown-menu dropdown-menu-lg dropdown-menu-right">
                    <div class="dropdown-divider"></div>
                    <a th:href="@{/usuarios/alterar-senha}" class="dropdown-item">
                        <i class="fas fa-key mr-2"></i> Alterar Senha
                    </a>
                    <div class="dropdown-divider"></div>
                    <!-- Logout -->
                    <form th:action="@{/logout}" method="post" class="d-none" id="logoutForm"></form>
                    <a href="#" class="dropdown-item" onclick="document.getElementById('logoutForm').submit()">
                        <i class="fas fa-sign-out-alt mr-2"></i> Sair
                    </a>
                </div>
            </li>
            <!-- Botão Sidebar Toggle (Mobile) -->
            <li class="nav-item">
                <a class="nav-link" data-widget="control-sidebar" data-slide="true" href="#" role="button">
                    <i class="fas fa-th-large"></i>
                </a>
            </li>
        </ul>
    </nav>
</div>
