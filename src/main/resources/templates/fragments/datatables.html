<!-- templates/fragments/datatables.html -->
<div th:fragment="assets">
  <script th:src="@{/plugins/datatables/jquery.dataTables.min.js}"></script>
  <script th:src="@{/plugins/datatables-bs4/js/dataTables.bootstrap4.min.js}"></script>
  <script th:src="@{/plugins/datatables-buttons/js/dataTables.buttons.min.js}"></script>
  <script th:src="@{/plugins/datatables-buttons/js/buttons.bootstrap4.min.js}"></script>
  <script th:src="@{/plugins/jszip/jszip.min.js}"></script>
  <script th:src="@{/plugins/pdfmake/pdfmake.min.js}"></script>
  <script th:src="@{/plugins/pdfmake/vfs_fonts.js}"></script>
  <script th:src="@{/plugins/datatables-buttons/js/buttons.html5.min.js}"></script>
  <script th:src="@{/plugins/datatables-buttons/js/buttons.print.min.js}"></script>
  <script th:src="@{/plugins/datatables-buttons/js/buttons.colVis.min.js}"></script>
</div>

<div th:fragment="init(tableId, ajaxUrl, columnsFactoryName)">
  <script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function () {
      const tableId = /*[[${tableId}]]*/ 'tabela';
      const ajaxUrl = /*[[${ajaxUrl}]]*/ '/datatables';
      const factory = /*[[${columnsFactoryName}]]*/ 'cols';

      const selector = '#' + tableId;
      const $table = $(selector);

      if ($table.length === 0) {
        console.warn('DataTable não encontrado:', selector);
        return;
      }

      const columnsFactory =
        (typeof window[factory] === 'function') ? window[factory] : null;

      if (!columnsFactory) {
        console.error('Factory de colunas não encontrada:', factory);
        return;
      }

      const columns = columnsFactory();

      if ($.fn.DataTable.isDataTable(selector)) {
        $table.DataTable().destroy();
        $table.find('tbody').empty();
      }

      $table.DataTable({
        ajax: {
          url: ajaxUrl,
          type: 'GET',
          dataSrc: 'data',
          error: function (xhr, error, thrown) {
            console.error('Erro ao carregar DataTable:', error, thrown);
            console.error('Resposta:', xhr.responseText);
          }
        },
        columns: columns,
        processing: true,
        serverSide: false,
        responsive: true,
        autoWidth: false,
        destroy: true,
        language: {
          url: '/plugins/datatables/i18n/pt-BR.json'
        },
        dom: 'Bfrtip',
        buttons: ['copy', 'csv', 'excel', 'pdf', 'print', 'colvis']
      });
    });
  </script>
</div>
