<!-- templates/fragments/head.html -->
<head th:fragment="head(titulo)">

    <!-- ========================= -->
    <!-- META -->
    <!-- ========================= -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- ========================= -->
    <!-- TITLE -->
    <!-- ========================= -->
    <title th:if="${titulo != null}" th:replace="${titulo}">SPK Sistemas</title>
    <title th:if="${titulo == null}">SPK Sistemas</title>

    <!-- ========================= -->
    <!-- CSRF -->
    <!-- ========================= -->
    <meta th:if="${_csrf != null}" name="_csrf" th:content="${_csrf.token}" />
    <meta th:if="${_csrf != null}" name="_csrf_header" th:content="${_csrf.headerName}" />

    <!-- ========================= -->
    <!-- CORE CSS (BASE DO SISTEMA) -->
    <!-- ========================= -->
    <link rel="stylesheet" th:href="@{/plugins/fontawesome-free/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/dist/css/adminlte.min.css}">

    <!-- ========================= -->
    <!-- CSS PADRÃO SPK (MASTER) -->
    <!-- ========================= -->
    <link rel="stylesheet" th:href="@{/css/spk-padrao.css}">

    <!-- ========================= -->
    <!-- CSS CUSTOM (LEGADO / AJUSTES) -->
    <!-- ========================= -->
    <!-- Mantido para compatibilidade -->
    <link rel="stylesheet" th:href="@{/css/app.css}">

    <!-- ========================= -->
    <!-- JS ESSENCIAIS (HEAD SAFE) -->
    <!-- ========================= -->

    <!-- SweetAlert2 -->
    <script defer th:src="@{/plugins/sweetalert2/sweetalert2.all.min.js}"></script>

</head><!-- templates/fragments/head.html -->
