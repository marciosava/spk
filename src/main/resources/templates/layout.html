<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/head :: head(~{::title})}">
  <title>SPK</title>
</head>

<body class="hold-transition sidebar-mini layout-fixed">
  <div class="wrapper">

    <!-- Header / Navbar -->
    <div th:replace="~{fragments/header :: cabecalho}"></div>

    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: nav-sidebar}"></div>

    <!-- Content Wrapper -->
    <div class="content-wrapper">

      <!-- Mensagens (flash/alerts) -->
      <div th:replace="~{fragments/mensagens :: mensagens}"></div>

      <!-- ===================== WORKSPACE (abas dinâmicas) ===================== -->
      <section class="content pt-2 px-2" id="workspace-root">
        <ul id="workspaceTabs" class="nav nav-tabs" role="tablist">
          <li class="nav-item">
            <a class="nav-link active" id="tab-home-link" data-toggle="tab" href="#tab_home" role="tab">
              <i class="fas fa-desktop mr-1"></i> Workspace
            </a>
          </li>
        </ul>

        <div id="workspaceContent" class="tab-content border-left border-right border-bottom rounded-bottom bg-white">
          <div class="tab-pane fade show active p-3" id="tab_home" role="tabpanel" aria-labelledby="tab-home-link">

            <!-- Aqui você coloca o banner futuramente -->
            <div class="text-muted">
              <i class="fas fa-info-circle mr-2"></i>
              Abra módulos pelo menu lateral: cada clique vira uma aba independente.
            </div>

          </div>
        </div>
      </section>
      <!-- =================== /WORKSPACE (abas dinâmicas) ===================== -->

      <!-- ✅ Conteúdo NORMAL (Dashboard/Home/etc.) vem aqui -->
      <section class="content pt-2 px-2" layout:fragment="corpo">
        <!-- conteúdo da página (fora do iframe) -->
      </section>

    </div>

    <!-- Footer -->
    <div th:replace="~{fragments/footer :: rodape}"></div>
  </div>

  <!-- Scripts básicos -->
  <script th:src="@{/plugins/jquery/jquery.min.js}"></script>
  <script th:src="@{/plugins/bootstrap/js/bootstrap.bundle.min.js}"></script>
  <script th:src="@{/dist/js/adminlte.min.js}"></script>

  <!-- Workspace JS -->
  <script th:src="@{/js/workspace.js}"></script>
</body>
</html>
