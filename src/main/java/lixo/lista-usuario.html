<!DOCTYPE html>
<html lang="pt-br"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout-iframe}">

<head>
    <title>Lista de Usuários | SPK Sistema</title>
</head>

<body>
<div layout:fragment="corpo">

    <section class="content">
        <div class="card card-outline card-primary">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h3 class="card-title mb-0">
                    <i class="fas fa-users mr-2"></i>Usuários Cadastrados
                </h3>

                <a class="btn btn-primary btn-sm" th:href="@{/usuarios/cadastrar}">
                    <i class="fas fa-user-plus mr-1"></i>Novo Usuário
                </a>
            </div>

            <div class="card-body">
                <table id="tabelaUsuarios" class="table table-bordered table-striped table-hover w-100">
                    <thead>
                    <tr class="text-center">
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Login</th>
                        <th>E-mail</th>
                        <th>Ativo</th>
                        <th>Perfis</th>
                        <th>Ações</th>
                    </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </section>

    <script th:src="@{/plugins/jquery/jquery.min.js}"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            $.getJSON('/usuarios/datatables', function (resp) {
                console.log('RETORNO DATATABLES:', resp);

                const tbody = $('#tabelaUsuarios tbody');
                tbody.empty();

                if (!resp || !resp.data || resp.data.length === 0) {
                    tbody.append('<tr><td colspan="7" class="text-center">Nenhum usuário encontrado.</td></tr>');
                    return;
                }

                resp.data.forEach(function (u) {
                    const badgeAtivo = u.ativo
                        ? '<span class="badge badge-success">Ativo</span>'
                        : '<span class="badge badge-danger">Inativo</span>';

                    let perfis = '';
                    if (u.roles && u.roles.trim() !== '') {
                        perfis = u.roles.split(',').map(function (r) {
                            return '<span class="badge badge-info mr-1">' + r.trim() + '</span>';
                        }).join('');
                    }

                    const acoes =
                        '<a class="btn btn-sm btn-info mr-1" href="/usuarios/editar/' + u.id + '" title="Editar">' +
                        '  <i class="fas fa-edit"></i>' +
                        '</a>' +
                        '<button type="button" class="btn btn-sm btn-danger" onclick="confirmarExclusao(\'/usuarios/excluir/' + u.id + '\')" title="Excluir">' +
                        '  <i class="fas fa-trash-alt"></i>' +
                        '</button>';

                    tbody.append(
                        '<tr>' +
                        '  <td class="text-center">' + u.id + '</td>' +
                        '  <td>' + (u.nome || '') + '</td>' +
                        '  <td>' + (u.username || '') + '</td>' +
                        '  <td>' + (u.email || '') + '</td>' +
                        '  <td class="text-center">' + badgeAtivo + '</td>' +
                        '  <td>' + perfis + '</td>' +
                        '  <td class="text-center">' + acoes + '</td>' +
                        '</tr>'
                    );
                });
            }).fail(function (xhr) {
                console.error('Erro ao buscar usuários:', xhr.responseText);
            });
        });
    </script>

</div>
</body>
</html>
